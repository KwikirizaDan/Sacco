<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
  </defs>

  <!-- ── Geometric mark ──────────────────────────────────────────────── -->
  <!-- Outer hexagon ring -->
  <polygon points="60,10 98,30 98,70 60,90 22,70 22,30" stroke="url(#amberGrad)" stroke-width="2.5" fill="none"/>
  <!-- Inner diamond -->
  <polygon points="60,22 82,50 60,78 38,50" fill="url(#markGrad)" opacity="0.15"/>
  <!-- Stack of three horizontal bars — represents data / savings layers -->
  <rect x="40" y="38" width="40" height="6" rx="3" fill="url(#amberGrad)"/>
  <rect x="44" y="49" width="32" height="6" rx="3" fill="url(#amberGrad)" opacity="0.75"/>
  <rect x="48" y="60" width="24" height="6" rx="3" fill="url(#amberGrad)" opacity="0.5"/>
  <!-- Top accent dot -->
  <circle cx="60" cy="17" r="3" fill="#F59E0B"/>

  <!-- ── Wordmark ─────────────────────────────────────────────────────── -->
  <!-- "Sacco" — heavy weight -->
  <text x="114" y="63" font-family="'Cabinet Grotesk', 'DM Sans', Georgia, serif" font-size="42" font-weight="800" letter-spacing="-1.5" fill="#0F172A">Sacco</text>
  <!-- "OS" — amber accent, slightly smaller -->
  <text x="278" y="63" font-family="'Cabinet Grotesk', 'DM Sans', Georgia, serif" font-size="42" font-weight="800" letter-spacing="-1.5" fill="url(#amberGrad)">OS</text>

  <!-- Tagline -->
  <text x="114" y="83" font-family="'DM Mono', 'Courier New', monospace" font-size="11" font-weight="400" letter-spacing="3" fill="#64748B">COOPERATIVE MANAGEMENT PLATFORM</text>
</svg>
